<!-- 页面内容为空，因为我们只需要全屏展示图片 -->

<!-- 自动播放的音乐 -->
<audio id="bgAudio">
    <source src="https://nnc-1314424002.cos.ap-nanjing.myqcloud.com/Genshin/qd.png?q-sign-algorithm=sha1&q-ak=AKIDuOa51Ej9Lc3GDJUuIMzTrrTjskLTzxHhmcBj5JPnjHm8xn73iJLM7feaEVNPIvoa&q-sign-time=1698895359;1698898959&q-key-time=1698895359;1698898959&q-header-list=host&q-url-param-list=ci-process&q-signature=bb13c9947484c642b7e561e97eaa6d3ab0f23d78&x-cos-security-token=5uKZZlknloEybUpySSt6TNaTQrBi2lYa3d73bfef1ad0c2da50d8c8d4776f5f703ONPcA4sfOOrgtb7xNer8Re-9pgRHVn67dMIjBoPNJsJF3izwMTShHWbZQxCisXkyA0RKSnStokEfzc25-wDe6PuCVRNORu5WM8ncdI4YiC7j0ugNMvb0R1mgEDF5p6VDDIsogWdnZh_543Uw96DsbbY3aRbAiN60wvks93ObCb-pgGXATj0XSFd_AnDBvum&ci-process=originImage" type="audio/mp4">
    Your browser does not support the audio element.
</audio>

<!-- 播放/暂停图标按钮 -->
<button class="icon-button" id="playPauseButton">
    <i class="fas fa-play"></i> <!-- 默认显示播放图标 -->
</button>

<script>
    var audio = document.getElementById('bgAudio');
    var playPauseButton = document.getElementById('playPauseButton');

    // 设置音乐从第5秒开始播放
    audio.currentTime = 5;

    // 点击按钮切换播放状态
    playPauseButton.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
            playPauseButton.innerHTML = '<i class="fas fa-pause"></i>'; // 切换到暂停图标
        } else {
            audio.pause();
            playPauseButton.innerHTML = '<i class="fas fa-play"></i>'; // 切换到播放图标
        }
    });

    // 检测浏览器语言
    var browserLanguage = navigator.language || navigator.userLanguage;

    // 检测是否是手机访问
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // 跳转逻辑
    function redirectToUrl() {
        if (isMobile) {
            // 如果是手机，尝试跳转到APP
            window.location.href = 'yuanshengame://';
        }

        if (browserLanguage !== 'zh-CN') {
            // 如果浏览器语言不是简体中文，跳转到https://genshin.hoyoverse.com/
            window.location.href = 'https://genshin.hoyoverse.com/';
        } else {
            // 否则，跳转到https://ys.mihoyo.com/
            window.location.href = 'https://ys.mihoyo.com/';
        }
    }

    // 5秒后进行跳转
    setTimeout(redirectToUrl, 5000);

    // 在页面加载后切换背景图片
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.body.style.backgroundImage = "url('https://nnc-1314424002.cos.ap-nanjing.myqcloud.com/Genshin/qd.png?q-sign-algorithm=sha1&q-ak=AKIDuOa51Ej9Lc3GDJUuIMzTrrTjskLTzxHhmcBj5JPnjHm8xn73iJLM7feaEVNPIvoa&q-sign-time=1698895359;1698898959&q-key-time=1698895359;1698898959&q-header-list=host&q-url-param-list=ci-process&q-signature=bb13c9947484c642b7e561e97eaa6d3ab0f23d78&x-cos-security-token=5uKZZlknloEybUpySSt6TNaTQrBi2lYa3d73bfef1ad0c2da50d8c8d4776f5f703ONPcA4sfOOrgtb7xNer8Re-9pgRHVn67dMIjBoPNJsJF3izwMTShHWbZQxCisXkyA0RKSnStokEfzc25-wDe6PuCVRNORu5WM8ncdI4YiC7j0ugNMvb0R1mgEDF5p6VDDIsogWdnZh_543Uw96DsbbY3aRbAiN60wvks93ObCb-pgGXATj0XSFd_AnDBvum&ci-process=originImage')";
        }, 3000);
    });
</script>
</body>
</html>
