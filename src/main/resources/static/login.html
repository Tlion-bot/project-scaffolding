<!doctype html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<h1>登录</h1>
<form onsubmit="handleSubmit(event)">

    <ol>
        <li> 用户：<input id="username" name="username" type="text"></li>
        <li> 密码：<input id="password" name="password" type="password"></li>
        <li> 验证码：<input id="captcha" name="captcha" type="text"> <img id="captcha-img" src="" onclick="refreshImage()">
        </li>
        <input type="submit" value="登录">
        <a href="/register.html" value="注册">注册</a>
        <a href="/emailLogin.html" value="邮箱登录">邮箱登录</a>
    </ol>
</form>

<script>
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.21.1/dist/axios.min.js"></script>
<script>
    var uuid;

    function refreshImage() {
        const captchaImg = document.getElementById('captcha-img');

        axios.get('http://localhost:8089/captchaImage')
            .then(function (response) {
                // 处理成功的情况
                console.log(response.data);
                captchaImg.src = "data:image/gif;base64," + response.data.data.img;
                uuid = response.data.data.uuid;
            })
            .catch(function (error) {
                // 处理错误的情况
                console.log(error);
            });
    }

    this.refreshImage();

    function handleSubmit(event) {
        event.preventDefault(); // 阻止表单默认的提交行为

        // 获取输入的用户名和密码
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const captcha = document.getElementById('captcha').value;


        // 清空输入框
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';


        var ifLogin;
        axios.post('http://localhost:8089/login', {
            username: username,
            password: password,
            code: captcha,
            uuid: uuid

        }, {
            headers: {
                'client': '1',
                'Content-Type': 'application/json'
            }
        })
            .then(function (response) {
                console.log(response.data);
                ifLogin = response.data.code;
                console.log(ifLogin)
                if (ifLogin===200) {
                    alert("登录成功");
                    setCookie("Admin-Token", response.data.data.token)
                    window.location.href = 'http://localhost:8089/newUpload.html';
                } else {
                    alert(response.data.msg);
                    this.refreshImage();
                }

            })
            .catch(function (error) {
                console.log(error);
            });


    }
    function setCookie(name, value) {
        const expires = new Date();
        expires.setTime(expires.getTime() + (1 * 24 * 60 * 60 * 1000)); // 设置过期时间为1天
        document.cookie = `${name}=${value}; expires=${expires.toUTCString()}; path=/`;
    }

</script>

</body>
</html>
