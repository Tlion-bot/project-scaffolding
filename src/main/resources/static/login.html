<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #2d2d2d;
            color: #fff;
        }

        h1 {
            text-align: center;
            color: #4caf50;
            margin-bottom: 30px;
        }

        form {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            box-sizing: border-box;
            background-color: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            border-radius: 5px;
            outline: none;
        }

        input[type="submit"] {
            background-color: #4caf50;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        a {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #4caf50;
            text-decoration: none;
        }

        img {
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>🚀 登录</h1>
<form onsubmit="handleSubmit(event)">
    <ol>
        <li> 用户：<input id="username" name="username" type="text"></li>
        <li> 密码：<input id="password" name="password" type="password"></li>
        <li> 验证码：<input id="captcha" name="captcha" type="text">
        </li>
        <li><img id="captcha-img" src=""
                 onclick="refreshImage()">
        </li>
        <input type="submit" value="登录">
        <a href="/register.html">注册</a>
        <a href="/emailLogin.html">邮箱登录</a>
    </ol>
</form>

<script>
</script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.21.1/dist/axios.min.js"></script>
<script>
    var uuid;

    function refreshImage() {
        const captchaImg = document.getElementById('captcha-img');

        axios.get('http://localhost:8089/captchaImage')
            .then(function (response) {
                // 处理成功的情况
                console.log(response.data);
                captchaImg.src = "data:image/gif;base64," + response.data.data.img;
                uuid = response.data.data.uuid;
            })
            .catch(function (error) {
                // 处理错误的情况
                console.log(error);
            });
    }

    this.refreshImage();

    function handleSubmit(event) {
        event.preventDefault(); // 阻止表单默认的提交行为

        // 获取输入的用户名和密码
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const captcha = document.getElementById('captcha').value;


        // 清空输入框
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';


        var ifLogin;
        axios.post('http://localhost:8089/login', {
            username: username,
            password: password,
            code: captcha,
            uuid: uuid

        }, {
            headers: {
                'client': '1',
                'Content-Type': 'application/json'
            }
        })
            .then(function (response) {
                console.log(response.data);
                ifLogin = response.data.code;
                console.log(ifLogin)
                if (ifLogin === 200) {
                    alert("登录成功");
                    setCookie("Admin-Token", response.data.data.token)
                    window.location.href = 'http://localhost:8089/newUpload.html';
                } else {
                    alert(response.data.msg);
                    this.refreshImage();
                }

            })
            .catch(function (error) {
                console.log(error);
            });


    }

    function setCookie(name, value) {
        const expires = new Date();
        expires.setTime(expires.getTime() + (1 * 24 * 60 * 60 * 1000)); // 设置过期时间为1天
        document.cookie = `${name}=${value}; expires=${expires.toUTCString()}; path=/`;
    }

</script>

</body>
</html>
