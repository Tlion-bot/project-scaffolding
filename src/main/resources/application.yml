upload:
  path: @profilePath@


  # 全局线程池相关配置
thread-pool:
  # 是否开启线程池
  enabled: true
  # 核心线程池大小
  corePoolSize: 8
  # 最大可创建的线程数
  maxPoolSize: 16
  # 队列最大长度
  queueCapacity: 128
  # 线程池维护线程所允许的空闲时间
  keepAliveSeconds: 300
  # 线程池对拒绝任务(无线程可用)的处理策略
  # CallerRunsPolicy 等待
  # DiscardOldestPolicy 放弃最旧的
  # DiscardPolicy 丢弃
  # AbortPolicy 中止
  rejectedExecutionHandler: ''

--- # redisson 客户端配置
redisson:
  # 线程池数量
  threads: 16
  # Netty线程池数量
  nettyThreads: 32
  # 传输模式
  transportMode: "NIO"
  # 单节点配置
  singleServerConfig:
    # 客户端名称
    clientName: ${base-work.name}
    # 最小空闲连接数
    connectionMinimumIdleSize: 32
    # 连接池大小
    connectionPoolSize: 64
    # 连接空闲超时，单位：毫秒
    idleConnectionTimeout: 10000
    # 命令等待超时，单位：毫秒
    timeout: 3000
    # 如果尝试在此限制之内发送成功，则开始启用 timeout 计时。
    retryAttempts: 3
    # 命令重试发送时间间隔，单位：毫秒
    retryInterval: 1500
    # 发布和订阅连接的最小空闲连接数
    subscriptionConnectionMinimumIdleSize: 1
    # 发布和订阅连接池大小
    subscriptionConnectionPoolSize: 50
    # 单个连接最大订阅数量
    subscriptionsPerConnection: 5
    # DNS监测时间间隔，单位：毫秒
    dnsMonitoringInterval: 5000

# 微信开发配置
wx:
  # 微信小程序开发
  miniapp:
    appid: @miniapp.appid@
    secret: @miniapp.secret@
    # 配置消息推送需要
    token: @miniapp.token@
    aesKey: @miniapp.aesKey@
    msgDataFormat: JSON
    # 存储类型
    config-storage:
      type: redistemplate
  #公众号配置
wechat:
  appId: @wechat.appId@
  appSecret: @wechat.appSecret@
  tempId: @wechat.tempId@
  myBirthday: @wechat.myBirthday@
  babyBirthday: @wechat.babyBirthday@
  loveDay: @wechat.loveDay@
#彩虹屁接口
tianapi:
  appKey: @tianapi.appKey@
  area: @tianapi.area@
